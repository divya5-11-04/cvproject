<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFace Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        }
        body {
            background: radial-gradient(circle at 20% 20%, #dbeafe 0%, #f8fafc 45%, #e2e8f0 100%);
        }
    </style>
</head>
<body class="min-h-screen font-sans text-gray-800">
    <nav class="bg-sky-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-camera-retro text-2xl"></i>
                    <span class="font-bold text-xl tracking-wide">SmartFace Attendance</span>
                </div>
                <div id="modelStatus" class="text-sm bg-sky-900/60 px-3 py-1 rounded-full">Loading AI models...</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="glass-panel rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-sky-700">
                        <i class="fas fa-user-plus mr-2"></i> Register Student
                    </h2>
                    <div id="registerStatus" class="hidden mb-3 text-sm rounded-md px-3 py-2"></div>
                    <form id="registerForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Student Name</label>
                            <input type="text" id="studentName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="e.g. John Doe">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Group</label>
                            <input type="text" id="studentGroup" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="e.g. G1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Upload Photo</label>
                            <input type="file" id="studentPhoto" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:font-semibold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100">
                        </div>
                        <p class="text-xs text-gray-500">You can upload one image or capture 8 photos from camera.</p>
                        <div class="flex space-x-2">
                            <button type="button" id="btnCaptureRegister" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Capture 8 Photos</button>
                            <button type="submit" class="flex-1 bg-sky-700 hover:bg-sky-800 text-white font-bold py-2 px-4 rounded">Register</button>
                        </div>
                    </form>
                </div>

                <div class="glass-panel rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-emerald-700">
                        <i class="fas fa-users mr-2"></i> Group Attendance
                    </h2>
                    <div id="groupStatus" class="hidden mb-3 text-sm rounded-md px-3 py-2"></div>
                    <form id="groupPhotoForm" class="space-y-4">
                        <input type="text" id="groupScopeName" placeholder="Group for this photo (optional, e.g. G1)" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <input type="file" id="groupPhoto" accept="image/*" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded">Process Classroom Photo</button>
                    </form>
                    <img id="processedPreview" class="mt-4 rounded-lg border border-gray-200 hidden" alt="Processed attendance preview" />
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center min-h-[400px] relative overflow-hidden bg-black">
                    <h2 class="absolute top-4 left-6 text-xl font-bold text-white z-10 flex items-center drop-shadow-md">
                        <i class="fas fa-video mr-2 text-red-500"></i> Live Scanner
                    </h2>
                    <div id="cameraStatus" class="hidden absolute top-14 left-6 right-6 text-sm rounded-md px-3 py-2 z-10"></div>
                    <video id="browserVideo" autoplay muted playsinline class="max-h-[400px] w-full object-contain hidden border-2 border-sky-500 rounded-lg"></video>
                    <canvas id="frameCanvas" class="hidden"></canvas>
                    <div id="videoPlaceholder" class="text-center text-gray-400">
                        <i class="fas fa-eye-slash text-6xl mb-4"></i>
                        <p>Camera is currently offline</p>
                    </div>
                    <div class="absolute bottom-4 flex space-x-4 z-10">
                        <button id="btnStartCamera" class="bg-sky-700 hover:bg-sky-800 text-white font-bold py-2 px-6 rounded-full shadow-lg">Start Scanner</button>
                        <button id="btnStopCamera" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full shadow-lg hidden">Stop Scanner</button>
                    </div>
                </div>

                <div class="glass-panel rounded-2xl p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold flex items-center text-gray-800">
                            <i class="fas fa-clipboard-list mr-2 text-sky-700"></i> Today's Attendance
                        </h2>
                        <button id="btnRefreshLog" class="text-sky-700 hover:text-sky-900"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                    <input type="text" id="filterGroup" placeholder="Filter by group" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border mb-4">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Group</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTableBody" class="bg-white divide-y divide-gray-200">
                                <tr><td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" colspan="4">No records yet for today.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        const STUDENTS_KEY = 'smartface_students_v2';
        const ATT_PREFIX = 'smartface_attendance_';
        const FACE_THRESHOLD = 0.52;

        const btnStartCamera = document.getElementById('btnStartCamera');
        const btnStopCamera = document.getElementById('btnStopCamera');
        const browserVideo = document.getElementById('browserVideo');
        const frameCanvas = document.getElementById('frameCanvas');
        const placeholder = document.getElementById('videoPlaceholder');
        const registerForm = document.getElementById('registerForm');
        const groupPhotoForm = document.getElementById('groupPhotoForm');
        const attendanceTableBody = document.getElementById('attendanceTableBody');
        const btnRefreshLog = document.getElementById('btnRefreshLog');
        const registerStatus = document.getElementById('registerStatus');
        const groupStatus = document.getElementById('groupStatus');
        const processedPreview = document.getElementById('processedPreview');
        const btnCaptureRegister = document.getElementById('btnCaptureRegister');
        const cameraStatus = document.getElementById('cameraStatus');
        const filterGroup = document.getElementById('filterGroup');
        const modelStatus = document.getElementById('modelStatus');

        let browserStream = null;
        let scannerTimer = null;
        let modelsReady = false;

        function showStatus(el, message, success = true) {
            el.textContent = message;
            el.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
            el.classList.add(success ? 'bg-green-50' : 'bg-red-50', success ? 'text-green-700' : 'text-red-700');
        }

        function todayKey() {
            return ATT_PREFIX + new Date().toISOString().slice(0, 10);
        }

        function getStudents() {
            const data = localStorage.getItem(STUDENTS_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveStudents(students) {
            localStorage.setItem(STUDENTS_KEY, JSON.stringify(students));
        }

        function getAttendance() {
            const data = localStorage.getItem(todayKey());
            return data ? JSON.parse(data) : [];
        }

        function saveAttendance(records) {
            localStorage.setItem(todayKey(), JSON.stringify(records));
        }

        function markAttendance(name, group) {
            const records = getAttendance();
            const exists = records.some((r) => r.Name === name && (r.Group || '') === (group || ''));
            if (!exists) {
                records.push({ Name: name, Group: group || '', Time: new Date().toLocaleTimeString() });
                saveAttendance(records);
            }
        }

        function renderAttendance() {
            const group = filterGroup.value.trim().toLowerCase();
            let records = getAttendance();
            if (group) records = records.filter((r) => (r.Group || '').toLowerCase() === group);

            if (!records.length) {
                attendanceTableBody.innerHTML = '<tr><td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" colspan="4">No records yet for today.</td></tr>';
                return;
            }

            attendanceTableBody.innerHTML = records.map((record) => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${record.Name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${record.Group || ''}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${record.Time}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Present</span></td>
                </tr>
            `).join('');
        }

        function euclidean(a, b) {
            let sum = 0;
            for (let i = 0; i < a.length; i += 1) {
                const d = a[i] - b[i];
                sum += d * d;
            }
            return Math.sqrt(sum);
        }

        function matchDescriptor(descriptor, groupFilter = '') {
            const students = getStudents();
            let best = { name: 'Unknown', group: '', distance: 999 };
            const normalizedFilter = groupFilter.trim().toLowerCase();

            students.forEach((student) => {
                if (normalizedFilter && (student.group || '').toLowerCase() !== normalizedFilter) return;
                (student.descriptors || []).forEach((desc) => {
                    const distance = euclidean(descriptor, desc);
                    if (distance < best.distance) {
                        best = { name: student.name, group: student.group || '', distance };
                    }
                });
            });

            if (best.distance <= FACE_THRESHOLD) return best;
            return { name: 'Unknown', group: '', distance: best.distance };
        }

        async function loadModels() {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            modelsReady = true;
            modelStatus.textContent = 'AI ready (Frontend only)';
        }

        async function ensureCamera() {
            if (browserStream) return;
            browserStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            browserVideo.srcObject = browserStream;
            await browserVideo.play();
        }

        function stopCamera() {
            if (scannerTimer) {
                clearInterval(scannerTimer);
                scannerTimer = null;
            }
            if (browserStream) {
                browserStream.getTracks().forEach((t) => t.stop());
                browserStream = null;
            }
            browserVideo.srcObject = null;
        }

        function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function descriptorFromImageElement(imageEl) {
            const detection = await faceapi
                .detectSingleFace(imageEl, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();
            if (!detection) return null;
            return Array.from(detection.descriptor);
        }

        async function descriptorFromVideo() {
            const detection = await faceapi
                .detectSingleFace(browserVideo, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();
            if (!detection) return null;
            return Array.from(detection.descriptor);
        }

        async function processLiveFrame() {
            const detections = await faceapi
                .detectAllFaces(browserVideo, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptors();

            const recognized = [];
            for (const det of detections) {
                const match = matchDescriptor(Array.from(det.descriptor), filterGroup.value.trim());
                if (match.name !== 'Unknown') {
                    markAttendance(match.name, match.group);
                    recognized.push(match.name);
                }
            }
            renderAttendance();
            showStatus(cameraStatus, `Live recognized: ${recognized.length ? recognized.join(', ') : 'None'}`, true);
        }

        function addStudentSamples(name, group, descriptors) {
            const students = getStudents();
            const existing = students.find((s) => s.name.toLowerCase() === name.toLowerCase() && (s.group || '').toLowerCase() === (group || '').toLowerCase());
            if (existing) {
                existing.descriptors = (existing.descriptors || []).concat(descriptors);
            } else {
                students.push({ name, group, descriptors: descriptors.slice() });
            }
            saveStudents(students);
        }

        btnStartCamera.addEventListener('click', async () => {
            if (!modelsReady) {
                showStatus(cameraStatus, 'Models are still loading, please wait...', false);
                return;
            }
            try {
                await ensureCamera();
                browserVideo.classList.remove('hidden');
                placeholder.classList.add('hidden');
                btnStartCamera.classList.add('hidden');
                btnStopCamera.classList.remove('hidden');
                scannerTimer = setInterval(async () => {
                    try {
                        await processLiveFrame();
                    } catch (err) {
                        showStatus(cameraStatus, err.message || 'Live scan failed', false);
                    }
                }, 1600);
            } catch (err) {
                showStatus(cameraStatus, err.message || 'Cannot access camera', false);
            }
        });

        btnStopCamera.addEventListener('click', () => {
            stopCamera();
            browserVideo.classList.add('hidden');
            placeholder.classList.remove('hidden');
            btnStartCamera.classList.remove('hidden');
            btnStopCamera.classList.add('hidden');
        });

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!modelsReady) return;
            const name = document.getElementById('studentName').value.trim();
            const group = document.getElementById('studentGroup').value.trim();
            const file = document.getElementById('studentPhoto').files[0];

            if (!name || !file) {
                showStatus(registerStatus, 'Enter name and upload a photo.', false);
                return;
            }

            const img = new Image();
            img.src = URL.createObjectURL(file);
            await img.decode();
            const descriptor = await descriptorFromImageElement(img);
            URL.revokeObjectURL(img.src);

            if (!descriptor) {
                showStatus(registerStatus, 'No face detected in uploaded photo.', false);
                return;
            }

            addStudentSamples(name, group, [descriptor]);
            showStatus(registerStatus, `Registered ${name} successfully.`, true);
        });

        btnCaptureRegister.addEventListener('click', async () => {
            if (!modelsReady) return;
            const name = document.getElementById('studentName').value.trim();
            const group = document.getElementById('studentGroup').value.trim();
            if (!name) {
                showStatus(registerStatus, 'Please enter student name.', false);
                return;
            }

            try {
                await ensureCamera();
                browserVideo.classList.remove('hidden');
                placeholder.classList.add('hidden');

                const descriptors = [];
                let attempts = 0;
                while (descriptors.length < 8 && attempts < 28) {
                    attempts += 1;
                    const descriptor = await descriptorFromVideo();
                    if (descriptor) {
                        descriptors.push(descriptor);
                        showStatus(registerStatus, `Captured ${descriptors.length}/8 photos...`, true);
                    }
                    await sleep(350);
                }

                if (descriptors.length < 7) {
                    showStatus(registerStatus, `Only ${descriptors.length} valid captures found. Try again in better light.`, false);
                    return;
                }

                addStudentSamples(name, group, descriptors);
                showStatus(registerStatus, `Registered ${name} with ${descriptors.length} photos.`, true);
            } catch (err) {
                showStatus(registerStatus, err.message || 'Webcam capture failed', false);
            }
        });

        groupPhotoForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!modelsReady) return;
            const file = document.getElementById('groupPhoto').files[0];
            const groupFilter = document.getElementById('groupScopeName').value.trim();
            if (!file) {
                showStatus(groupStatus, 'Please upload classroom photo.', false);
                return;
            }

            const img = new Image();
            img.src = URL.createObjectURL(file);
            await img.decode();

            const detections = await faceapi
                .detectAllFaces(img, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptors();

            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            const recognized = [];
            let unknown = 0;

            detections.forEach((det) => {
                const box = det.detection.box;
                const match = matchDescriptor(Array.from(det.descriptor), groupFilter);
                const isKnown = match.name !== 'Unknown';
                if (isKnown) {
                    markAttendance(match.name, match.group);
                    recognized.push(match.name);
                } else {
                    unknown += 1;
                }

                ctx.strokeStyle = isKnown ? '#16a34a' : '#dc2626';
                ctx.lineWidth = 3;
                ctx.strokeRect(box.x, box.y, box.width, box.height);
                ctx.fillStyle = isKnown ? '#16a34a' : '#dc2626';
                ctx.fillRect(box.x, box.y + box.height - 24, box.width, 24);
                ctx.fillStyle = '#ffffff';
                ctx.font = '14px sans-serif';
                ctx.fillText(isKnown ? match.name : 'Unknown', box.x + 6, box.y + box.height - 7);
            });

            processedPreview.src = canvas.toDataURL('image/jpeg', 0.92);
            processedPreview.classList.remove('hidden');
            showStatus(groupStatus, `Processed. Recognized: ${recognized.length ? [...new Set(recognized)].join(', ') : 'None'}. Unknown: ${unknown}.`, true);
            renderAttendance();
            URL.revokeObjectURL(img.src);
        });

        btnRefreshLog.addEventListener('click', renderAttendance);
        filterGroup.addEventListener('input', renderAttendance);

        (async () => {
            try {
                await loadModels();
            } catch (err) {
                modelStatus.textContent = 'Model load failed';
                const detail = err && err.message ? err.message : 'Unknown error';
                showStatus(cameraStatus, `Failed to load AI models: ${detail}`, false);
            }
            renderAttendance();
        })();
    </script>
</body>
</html>
